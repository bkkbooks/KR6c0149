body:
  text: 刻般若心經疏詒謀鈔跋詒謀鈔宋孤山圓師釋自撰般若心經疏其書研精發微使經疏旨益彰彰焉誠有益於物也然疏已久行而其鈔未流學者憾之近吾靈空和尚嘗為之較正且加訓點劂生請鍥諸梓就豫需跋語豫雖不文隨喜其成遂書卑云享保己亥年五月天台沙門智空謹書
